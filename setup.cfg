[flake8]
max-line-length = 100
exclude = 
    .git,
    __pycache__,
    .venv,
    venv,
    env,
    migrations,
    settings.py,
    wsgi.py,
    asgi.py
ignore = E203, E266, E501, W503
max-complexity = 15
select = B,C,E,F,W,T4,B9

[mypy]
python_version = 3.11
check_untyped_defs = True
ignore_missing_imports = True
warn_unused_ignores = True
warn_redundant_casts = True
warn_unused_configs = True
exclude = migrations|tests
